<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Fotoğraf Baskı Sistemi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: #333; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; filter: blur(10px); pointer-events: none; transition: 0.5s; }
        .unlocked .container { filter: blur(0); pointer-events: auto; }
        
        /* Auth Overlay */
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .auth-box { background: white; padding: 40px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        header { text-align: center; color: white; padding: 20px; cursor: pointer; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .nav-btn { padding: 12px 24px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; background: white; color: #667eea; }
        .nav-btn.active { background: #ffd700; color: #333; }
        
        .packages-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .package-card { background: white; border-radius: 20px; padding: 20px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .buy-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; background: #27ae60; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .input-style { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; }
        
        .photo-preview img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; margin: 2px; }
        .status-bekliyor { background: #f1c40f; padding: 5px 10px; border-radius: 10px; font-size: 0.8rem; }
        .hidden { display: none !important; }
    </style>
</head><body id="mainBody">
    <div id="authOverlay">
        <div class="auth-box">
            <h2 id="authTitle">👋 Hoş Geldiniz</h2>
            <p style="margin-bottom: 20px; color: #666;">Devam etmek için giriş yapın.</p>
            <input type="text" id="authName" class="input-style" placeholder="Ad Soyad">
            <input type="text" id="authClass" class="input-style" placeholder="Sınıf (Örn: 10-A)">
            <button class="buy-btn" onclick="handleAuth()" id="authBtn">Kayıt Ol / Giriş Yap</button>
            <p id="authMsg" style="color: red; font-size: 0.8rem; margin-top: 10px;"></p>
        </div>
    </div>

    <div class="container">
        <header onclick="secretClick()">
            <h1>📸 Okul Fotoğraf Servisi</h1>
            <div id="userInfoDisplay" style="background:white; display:inline-block; padding:8px 20px; border-radius:50px; margin-top:10px; color:#333; font-weight:bold; font-size:0.9rem;">
                👤 <span id="dispName">...</span> <span id="dispCode" style="color:#667eea">#0000</span> | 💰 <span id="userCredits">0</span> ₺
            </div>
        </header>

        <div class="nav-tabs">
            <button class="nav-btn active" onclick="showSection('packages', this)">📦 Paketler</button>
            <button class="nav-btn" onclick="showSection('games', this)">🎡 Çark</button>
            <button class="nav-btn" onclick="showSection('cart', this)">🛒 Sepet (<span id="cartCount">0</span>)</button>
            <button id="adminTab" class="nav-btn hidden" onclick="showSection('admin', this)">👑 Yönetim</button>
        </div>

        <div id="packages" class="section active">
            <div class="packages-grid">
                <div class="package-card">
                    <div><h2>Fakirno</h2><h3 style="color:#e74c3c">15 ₺</h3><p>4 Fotoğraf</p></div>
                    <input type="file" id="files-fakirno" multiple accept="image/*" onchange="validatePhotos('fakirno', 4)" class="hidden">
                    <button class="nav-btn" style="border:1px solid #667eea" onclick="document.getElementById('files-fakirno').click()">🖼️ Foto Seç</button>
                    <button class="buy-btn" id="btn-fakirno" onclick="addToCart('Fakirno', 15, 'fakirno')" disabled>Sepete Ekle</button>
                </div>
                <div class="package-card">
                    <div><h2>Instagram</h2><h3 style="color:#e74c3c">50 ₺</h3><p>14 Fotoğraf</p></div>
                    <input type="file" id="files-insta" multiple accept="image/*" onchange="validatePhotos('insta', 14)" class="hidden">
                    <button class="nav-btn" style="border:1px solid #667eea" onclick="document.getElementById('files-insta').click()">🖼️ Foto Seç</button>
                    <button class="buy-btn" id="btn-insta" onclick="addToCart('Instagram', 50, 'insta')" disabled>Sepete Ekle</button>
                </div>
            </div>
        </div><div id="packages-extra" class="section active"> <div class="packages-grid" style="margin-top:20px">
                <div class="package-card">
                    <div><h2>Einstein</h2><h3 style="color:#e74c3c">80 ₺</h3><p>25 Fotoğraf</p></div>
                    <input type="file" id="files-ein" multiple accept="image/*" onchange="validatePhotos('ein', 25)" class="hidden">
                    <button class="nav-btn" style="border:1px solid #667eea" onclick="document.getElementById('files-ein').click()">🖼️ Foto Seç</button>
                    <button class="buy-btn" id="btn-ein" onclick="addToCart('Einstein', 80, 'ein')" disabled>Sepete Ekle</button>
                </div>
                <div class="package-card">
                    <div><h2>BEN COK ZENGINIIIM</h2><h3 style="color:#e74c3c">150 ₺</h3><p>50 Fotoğraf</p></div>
                    <input type="file" id="files-rich" multiple accept="image/*" onchange="validatePhotos('rich', 50)" class="hidden">
                    <button class="nav-btn" style="border:1px solid #667eea" onclick="document.getElementById('files-rich').click()">🖼️ Foto Seç</button>
                    <button class="buy-btn" id="btn-rich" onclick="addToCart('Zengin', 150, 'rich')" disabled>Sepete Ekle</button>
                </div>
            </div>
        </div>

        <div id="games" class="section">
            <div class="package-card" style="max-width:400px; margin:0 auto;">
                <h3>🎡 Şans Çarkı</h3>
                <div id="wheel" style="width:200px; height:200px; border-radius:50%; border:5px solid #333; margin:20px auto; transition: 4s; background: conic-gradient(#f1c40f 0% 25%, #ecf0f1 25% 50%, #2ecc71 50% 75%, #3498db 75% 100%);"></div>
                <button class="buy-btn" style="background:#8e44ad" onclick="spinWheel()">ÇEVİR (Günde 1)</button>
                <p id="wheelMsg"></p>
            </div>
        </div>

        <div id="cart" class="section">
            <div class="package-card">
                <h2>🛒 Sepetiniz</h2>
                <div id="cartList"></div>
                <h3>Toplam: <span id="totalPrice">0</span> ₺</h3>
                <button class="buy-btn" id="checkoutBtn" onclick="processOrder()" disabled>Siparişi Onayla</button>
            </div>
        </div>

        <div id="admin" class="section">
            <div class="package-card">
                <h2>👑 Yönetim Paneli</h2>
                <div id="adminOrders"></div>
            </div>
        </div>
    </div><script>
    let currentUser = null;
    let credits = 0; let cart = []; let orders = []; let tempFiles = {};
    let secretCounter = 0;

    // AUTH SYSTEM
    function handleAuth() {
        const name = document.getElementById('authName').value;
        const classInfo = document.getElementById('authClass').value;
        if(name.length < 3 || classInfo.length < 2) return alert("Geçerli bilgiler girin!");

        let savedUser = JSON.parse(localStorage.getItem('photoUser'));
        const today = new Date().toDateString();

        if(savedUser) {
            // Check for 1-day change limit
            if(savedUser.name !== name || savedUser.class !== classInfo) {
                if(localStorage.getItem('lastUpdate') === today) {
                    return alert("Bilgilerini günde sadece 1 kez değiştirebilirsin!");
                }
                savedUser.name = name;
                savedUser.class = classInfo;
                localStorage.setItem('lastUpdate', today);
            }
        } else {
            // Create New User with Permanent 4-Digit Code
            const randomCode = Math.floor(1000 + Math.random() * 9000);
            savedUser = { name, class, code: randomCode, credits: 0 };
        }

        currentUser = savedUser;
        localStorage.setItem('photoUser', JSON.stringify(currentUser));
        
        document.getElementById('dispName').innerText = currentUser.name;
        document.getElementById('dispCode').innerText = "#" + currentUser.code;
        document.getElementById('mainBody').classList.add('unlocked');
        document.getElementById('authOverlay').classList.add('hidden');
    }

    function secretClick() {
        secretCounter++;
        if(secretCounter >= 5) {
            const pass = prompt("Gizli Kelimeyi Girin:");
            if(pass === "ThePassMustiGithub") {
                document.getElementById('adminTab').classList.remove('hidden');
                alert("Yönetici modu aktif!");
            }
            secretCounter = 0;
        }
    }

    function showSection(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'packages') document.getElementById('packages-extra').classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(id === 'admin') renderAdmin();
    }
</script><script>
    function validatePhotos(pkg, count) {
        const input = document.getElementById(`files-${pkg}`);
        const btn = document.getElementById(`btn-${pkg}`);
        if(input.files.length === count) {
            btn.disabled = false;
            tempFiles[pkg] = Array.from(input.files);
        } else { alert("Tam " + count + " adet seçmelisin!"); btn.disabled = true; }
    }

    function addToCart(name, price, pkgKey) {
        cart.push({ name, price, photos: tempFiles[pkgKey] });
        updateCart();
        alert(name + " sepette!");
    }

    function updateCart() {
        const list = document.getElementById('cartList');
        list.innerHTML = cart.map(i => `<div>${i.name} - ${i.price}₺</div>`).join('');
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('totalPrice').innerText = total;
        document.getElementById('cartCount').innerText = cart.length;
        document.getElementById('checkoutBtn').disabled = cart.length === 0;
    }

    function processOrder() {
        orders.push({
            user: currentUser.name,
            class: currentUser.class,
            code: currentUser.code,
            items: [...cart],
            status: 'bekliyor',
            time: new Date().toLocaleTimeString()
        });
        cart = []; updateCart();
        alert("Sipariş iletildi! Kodunuz: #" + currentUser.code);
    }

    function spinWheel() {
        const lastSpin = localStorage.getItem('lastSpin');
        if(lastSpin === new Date().toDateString()) return alert("Yarın tekrar gel!");
        
        const deg = Math.floor(1800 + Math.random() * 1800);
        document.getElementById('wheel').style.transform = `rotate(${deg}deg)`;
        
        setTimeout(() => {
            const win = [2, 0, 5, 0][Math.floor(Math.random() * 4)];
            credits += win;
            document.getElementById('userCredits').innerText = credits;
            localStorage.setItem('lastSpin', new Date().toDateString());
            alert(win > 0 ? win + " Kredi Kazandın!" : "Pas geçtin!");
        }, 4000);
    }

    function renderAdmin() {
        const cont = document.getElementById('adminOrders');
        cont.innerHTML = orders.map(o => `
            <div style="border-bottom:1px solid #ddd; padding:10px; margin-top:10px;">
                <b>${o.user} (${o.class}) <span style="color:blue">#${o.code}</span></b>
                <div class="photo-preview">
                    ${o.items.map(i => i.photos.map(p => `<img src="${URL.createObjectURL(p)}">`).join('')).join('')}
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
