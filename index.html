<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quail Farm - Global</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --egg-cream: #FDF5E6;
            --speckle-brown: #4E342E;
            --teal-accent: #4DB6AC;
            --white: #FFFFFF;
        }

        body {
            background-color: var(--egg-cream);
            font-family: 'Trebuchet MS', sans-serif;
            color: var(--speckle-brown);
            margin: 0; padding: 20px;
        }

        /* LANGUAGE POPUP */
        #lang-popup {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(46, 34, 34, 0.98);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .flag-btn { font-size: 60px; cursor: pointer; margin: 15px; transition: 0.3s; }
        .flag-btn:hover { transform: scale(1.2); }

        /* HEADER */
        .header-panel {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--white); padding: 15px; border-radius: 12px;
            border: 3px solid var(--speckle-brown); margin-bottom: 20px;
        }
        #owner-input { padding: 8px; border-radius: 5px; border: 1px solid #ccc; }

        /* SHOP CARDS */
        .shop-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .card {
            background: var(--white); padding: 20px; border-radius: 20px;
            width: 260px; text-align: center; border: 2px solid var(--speckle-brown);
            box-shadow: 8px 8px 0px var(--teal-accent);
        }
        .promo-text { font-weight: bold; font-size: 14px; display: block; height: 20px; margin-bottom: 5px; }
        .price-tag { font-size: 28px; font-weight: bold; }

        /* CART & OWNER PANEL */
        #cart, #owner-panel {
            margin: 30px auto; max-width: 600px; background: var(--white); padding: 25px;
            border-radius: 20px; border: 2px solid var(--speckle-brown);
        }
        #owner-panel { background: #fffcf0; border-color: #d32f2f; display: none; }
        
        button {
            background: var(--speckle-brown); color: white; border: none;
            padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        button:hover { background: var(--teal-accent); }
        input { padding: 8px; margin: 5px; border-radius: 5px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div id="lang-popup">
    <h1 style="color: white;">Select Language</h1>
    <div>
        <span class="flag-btn" onclick="closeLang()">🇹🇷</span>
        <span class="flag-btn" onclick="closeLang()">🇬🇧</span>
        <span class="flag-btn" onclick="closeLang()">🇸🇦</span>
    </div>
</div>

<div class="header-panel">
    <h1>Quail Farm</h1>
    <input type="password" id="owner-input" placeholder="Owner Code..." oninput="checkOwnerCode(this.value)">
</div>

<div class="shop-container">
    <div class="card">
        <span id="egg-promo" class="promo-text"></span>
        <h2>Quail Egg</h2>
        <div class="price-tag"><span id="egg-price-display">7</span> TL</div>
        <br>
        <input type="number" id="egg-qty" value="1" min="1" style="width: 50px;">
        <button onclick="order('Egg')">Add to Cart</button>
    </div>

    <div class="card">
        <span id="quail-promo" class="promo-text"></span>
        <h2>Live Quail</h2>
        <div class="price-tag"><span id="quail-price-display">135</span> TL</div>
        <br>
        <input type="number" id="quail-qty" value="1" min="1" style="width: 50px;">
        <button onclick="order('Quail')">Add to Cart</button>
    </div>
</div>

<div id="cart" style="display: none;">
    <h2>Your Basket</h2>
    <div id="cart-list"></div>
</div>

<div id="owner-panel">
    <h2 style="color: #d32f2f;">Owner Control Center</h2>
    <div style="border-bottom: 2px solid #ddd; padding-bottom: 10px;">
        <h3>Update Shop Prices & Promos</h3>
        Egg Price: <input type="number" id="adm-egg-p" value="7"> 
        Text: <input type="text" id="adm-egg-t"> 
        Color: <input type="color" id="adm-egg-c" value="#ff0000"><br>
        
        Quail Price: <input type="number" id="adm-quail-p" value="135"> 
        Text: <input type="text" id="adm-quail-t"> 
        Color: <input type="color" id="adm-quail-c" value="#ff0000"><br>
        
        <button onclick="saveSettings()">Apply Changes Globally</button>
    </div>

    <h3>Live Orders</h3>
    <div id="admin-orders"></div>
</div>

<script>
    // FIREBASE INITIALIZATION
    const firebaseConfig = {
        databaseURL: "https://realtime-numbers-ddc3e-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const statuses = ["Harvesting", "Harvested, Packing", "Delivering", "Delivered!"];

    function closeLang() { document.getElementById('lang-popup').style.display = 'none'; }

    function checkOwnerCode(val) {
        if(val === "ThePassMustiGithub") {
            document.getElementById('owner-panel').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        }
    }

    function saveSettings() {
        db.ref('settings').set({
            eggP: document.getElementById('adm-egg-p').value,
            eggT: document.getElementById('adm-egg-t').value,
            eggC: document.getElementById('adm-egg-c').value,
            quailP: document.getElementById('adm-quail-p').value,
            quailT: document.getElementById('adm-quail-t').value,
            quailC: document.getElementById('adm-quail-c').value
        });
        alert("Prices updated for all users!");
    }

    db.ref('settings').on('value', (snap) => {
        const s = snap.val();
        if(s) {
            document.getElementById('egg-price-display').innerText = s.eggP;
            document.getElementById('egg-promo').innerText = s.eggT;
            document.getElementById('egg-promo').style.color = s.eggC;
            document.getElementById('quail-price-display').innerText = s.quailP;
            document.getElementById('quail-promo').innerText = s.quailT;
            document.getElementById('quail-promo').style.color = s.quailC;
        }
    });

    function order(type) {
        const qty = (type === 'Egg') ? document.getElementById('egg-qty').value : document.getElementById('quail-qty').value;
        const price = (type === 'Egg') ? document.getElementById('egg-price-display').innerText : document.getElementById('quail-price-display').innerText;
        
        const newOrder = {
            item: type,
            quantity: qty,
            total: qty * price,
            status: "Harvesting",
            timestamp: Date.now()
        };
        
        db.ref('orders').push(newOrder);
        document.getElementById('cart').style.display = 'block';
        alert("Success! Check your status in the basket.");
    }

    db.ref('orders').on('value', (snap) => {
        const orders = snap.val();
        const cartList = document.getElementById('cart-list');
        const adminList = document.getElementById('admin-orders');
        
        cartList.innerHTML = "";
        adminList.innerHTML = "";

        for(let id in orders) {
            const o = orders[id];
            cartList.innerHTML += `<p>📦 <b>${o.quantity}x ${o.item}</b> - Status: <span style="color:var(--teal-accent)">${o.status}</span></p>`;
            
            adminList.innerHTML += `
                <div style="border:1px solid #ccc; padding:10px; margin-bottom:5px; background:#fff;">
                    ${o.quantity} ${o.item} (${o.total} TL) <br>
                    <button onclick="nextStatus('${id}', '${o.status}')">Update Status: ${o.status}</button>
                    <button style="background:#ff4d4d" onclick="deleteOrder('${id}')">Delete</button>
                </div>`;
        }
    });

    function nextStatus(id, current) {
        let nextIdx = (statuses.indexOf(current) + 1) % statuses.length;
        db.ref('orders/' + id).update({ status: statuses[nextIdx] });
    }

    function deleteOrder(id) {
        if(confirm("Permanently delete this order?")) db.ref('orders/' + id).remove();
    }
</script>

</body>
    </html>
