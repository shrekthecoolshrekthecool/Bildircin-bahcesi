<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quail Farm</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --egg-cream: #FDF5E6;
            --speckle-brown: #4E342E;
            --teal-accent: #4DB6AC;
            --white: #FFFFFF;
        }

        body { 
            background-color: var(--egg-cream); 
            font-family: 'Trebuchet MS', sans-serif; 
            color: var(--speckle-brown); 
            margin: 0; padding: 20px; 
            padding-bottom: 100px;
        }

        /* OVERLAYS & POPUPS */
        #lang-popup, #payment-popup, #banned-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(46, 34, 34, 0.98); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999;
        }
        #payment-popup, #banned-screen { display: none; text-align: center; color: white; padding: 20px; }
        .flag-btn { font-size: 60px; cursor: pointer; margin: 15px; transition: 0.3s; }

        /* HEADER */
        .header-panel {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--white); padding: 15px; border-radius: 12px;
            border: 3px solid var(--speckle-brown); margin-bottom: 20px;
        }

        /* SHOP */
        .shop-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .card {
            background: var(--white); padding: 20px; border-radius: 20px;
            width: 260px; text-align: center; border: 2px solid var(--speckle-brown);
            box-shadow: 8px 8px 0px var(--teal-accent);
        }

        /* TOGGLEABLE CHAT */
        #chat-wrapper { position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; align-items: flex-end; }
        #chat-toggle-btn {
            width: 60px; height: 60px; background: var(--speckle-brown); color: white;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 24px;
        }
        #chat-container {
            width: 300px; height: 400px; background: white; border: 2px solid var(--speckle-brown);
            border-radius: 15px; display: none; flex-direction: column; overflow: hidden; margin-bottom: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background: #fdfdfd; }
        .msg { margin: 5px 0; padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 14px; }
        .msg-u { background: var(--teal-accent); color: white; align-self: flex-end; }
        .msg-o { background: #eee; color: var(--speckle-brown); align-self: flex-start; }

        /* ADMIN PANEL */
        #admin-panel { margin: 30px auto; max-width: 800px; background: #fffcf0; padding: 25px; border-radius: 20px; border: 2px solid #d32f2f; display: none; }
        .admin-section { border-bottom: 1px solid #ddd; padding: 15px 0; }

        button { background: var(--speckle-brown); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        input { padding: 8px; border-radius: 5px; border: 1px solid #ccc; margin: 5px; }
    </style>
</head>
<body>

<div id="banned-screen"><h1>⛔ ACCESS DENIED</h1><p>Your ID has been blocked.</p></div>

<div id="lang-popup">
    <h1 style="color:white">Select Language</h1>
    <div>
        <span class="flag-btn" onclick="applyLang('tr')">🇹🇷</span>
        <span class="flag-btn" onclick="applyLang('en')">🇬🇧</span>
        <span class="flag-btn" onclick="applyLang('sa')">🇸🇦</span>
    </div>
</div>

<div id="payment-popup">
    <div style="background: white; color: black; padding: 30px; border-radius: 20px; max-width: 350px;">
        <h2>Payment</h2>
        <p>Total: <b id="pay-amt"></b> TL</p>
        <p>Send to IBAN:</p>
        <div style="background:#eee; padding:10px; border-radius:5px; word-break:break-all;"><b id="display-iban">Loading...</b></div>
        <p>Your Name/Ref:</p>
        <input type="text" id="pay-ref" placeholder="Full Name"><br><br>
        <button onclick="confirmOrder()">Sent Payment</button>
        <button style="background:gray" onclick="document.getElementById('payment-popup').style.display='none'">Back</button>
    </div>
</div>

<div class="header-panel">
    <div><h1>Quail Farm</h1><small>ID: <span id="my-id-label"></span></small></div>
    <div>Codes: <input type="password" oninput="checkAdmin(this.value)" style="width:80px;"></div>
</div>

<div class="shop-container">
    <div class="card">
        <h2 id="ui-egg">Quail Egg</h2>
        <div style="font-size:24px;"><span id="egg-p">7</span> TL</div>
        <button onclick="startPay('Egg')">Order</button>
    </div>
    <div class="card">
        <h2 id="ui-quail">Live Quail</h2>
        <div style="font-size:24px;"><span id="quail-p">135</span> TL</div>
        <button onclick="startPay('Quail')">Order</button>
    </div>
</div>

<div id="chat-wrapper">
    <div id="chat-container">
        <div style="background:var(--speckle-brown); color:white; padding:10px; display:flex; justify-content:space-between;">
            <span>Support</span>
            <span onclick="toggleChat()" style="cursor:pointer">×</span>
        </div>
        <div id="chat-messages"></div>
        <div style="display:flex; padding:5px; border-top:1px solid #eee;">
            <input type="text" id="chat-in" placeholder="Message..." style="flex:1">
            <button onclick="sendChat()">></button>
        </div>
    </div>
    <div id="chat-toggle-btn" onclick="toggleChat()">💬</div>
</div>

<div id="admin-panel">
    <h2>Owner Panel</h2>
    <div class="admin-section">
        <h3>Settings</h3>
        IBAN: <input type="text" id="set-iban"><br>
        Egg Price: <input type="number" id="set-egg-p"><br>
        <button onclick="updateSettings()">Update Globally</button>
    </div>
    <div class="admin-section">
        <h3>Orders</h3>
        <div id="adm-orders"></div>
    </div>
    <div class="admin-section">
        <h3>Chats</h3>
        <div id="adm-chats" style="max-height:200px; overflow:auto; background:white; border:1px solid #ccc;"></div>
        <input type="text" id="rep-id" placeholder="User ID">
        <input type="text" id="rep-msg" placeholder="Reply...">
        <button onclick="adminReply()">Send Reply</button>
    </div>
</div>

<script>
    // 1. FIREBASE (Use your link)
    const firebaseConfig = { databaseURL: "https://realtime-numbers-ddc3e-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. USER ID & BAN SYSTEM
    let myID = localStorage.getItem('qf_id') || (Math.floor(1000+Math.random()*9000)+"-"+Math.floor(1000+Math.random()*9000));
    localStorage.setItem('qf_id', myID);
    document.getElementById('my-id-label').innerText = myID;

    db.ref('banned/'+myID).on('value', snap => { if(snap.val()) document.getElementById('banned-screen').style.display='flex'; });

    // 3. LANGUAGE
    const trans = {
        tr: { egg:"Yumurta", quail:"Bıldırcın" },
        en: { egg:"Quail Egg", quail:"Live Quail" },
        sa: { egg:"بيض", quail:"سمان" }
    };
    function applyLang(l) {
        document.getElementById('ui-egg').innerText = trans[l].egg;
        document.getElementById('ui-quail').innerText = trans[l].quail;
        document.getElementById('lang-popup').style.display='none';
    }

    // 4. SETTINGS & SHOP
    function updateSettings() {
        db.ref('settings').set({ 
            iban: document.getElementById('set-iban').value, 
            eggP: document.getElementById('set-egg-p').value 
        });
    }

    db.ref('settings').on('value', snap => {
        const s = snap.val();
        if(s) {
            document.getElementById('display-iban').innerText = s.iban;
            document.getElementById('egg-p').innerText = s.eggP;
            document.getElementById('set-iban').value = s.iban || "";
            document.getElementById('set-egg-p').value = s.eggP || 7;
        }
    });

    // 5. CHAT TOGGLE & LOGIC
    function toggleChat() {
        const c = document.getElementById('chat-container');
        c.style.display = (c.style.display==='flex') ? 'none' : 'flex';
    }

    function sendChat() {
        const t = document.getElementById('chat-in').value;
        if(t) db.ref('chats/'+myID).push({ s:'u', t:t });
        document.getElementById('chat-in').value = "";
    }

    db.ref('chats/'+myID).on('value', snap => {
        const m = snap.val(); let h = "";
        for(let id in m) h += `<div class="msg msg-${m[id].s}">${m[id].t}</div>`;
        document.getElementById('chat-messages').innerHTML = h;
        document.getElementById('chat-messages').scrollTop = 9999;
    });

    // 6. ORDERING
    function startPay(t) {
        document.getElementById('pay-amt').innerText = (t==='Egg')?document.getElementById('egg-p').innerText:135;
        document.getElementById('payment-popup').style.display='flex';
    }
    function confirmOrder() {
        const r = document.getElementById('pay-ref').value;
        if(r) db.ref('orders').push({ user:myID, ref:r, time:Date.now() });
        document.getElementById('payment-popup').style.display='none';
    }

    // 7. ADMIN FUNCTIONS
    function checkAdmin(v) { if(v==="ThePassMustiGithub") document.getElementById('admin-panel').style.display='block'; }
    
    db.ref('orders').on('value', snap => {
        let h = ""; const o = snap.val();
        for(let id in o) h += `<div style="background:white;margin:5px;padding:5px;"><b>ID: ${o[id].user}</b> (${o[id].ref}) 
            <button onclick="db.ref('orders/${id}').remove()">Del</button>
            <button style="background:orange" onclick="db.ref('banned/${o[id].user}').set(true)">Ban</button></div>`;
        document.getElementById('adm-orders').innerHTML = h;
    });

    db.ref('chats').on('value', snap => {
        let h = ""; const c = snap.val();
        for(let uid in c) {
            h += `<div style="background:#eee;padding:2px;"><b>User: ${uid}</b></div>`;
            for(let mid in c[uid]) h += `<div>${c[uid][mid].s}: ${c[uid][mid].t}</div>`;
        }
        document.getElementById('adm-chats').innerHTML = h;
    });

    function adminReply() {
        const id = document.getElementById('rep-id').value;
        const m = document.getElementById('rep-msg').value;
        if(id && m) db.ref('chats/'+id).push({ s:'o', t:m });
        document.getElementById('rep-msg').value = "";
    }
</script>
</body>
                    </html>
