<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quail Farm</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --egg-cream: #FDF5E6; --speckle-brown: #4E342E; --teal-accent: #4DB6AC; --white: #FFFFFF; }
        body { background-color: var(--egg-cream); font-family: 'Trebuchet MS', sans-serif; color: var(--speckle-brown); margin: 0; padding: 20px; padding-bottom: 150px; }
        
        /* SCREENS */
        #lang-popup, #payment-popup, #banned-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(46, 34, 34, 0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        #payment-popup, #banned-screen { display: none; text-align: center; color: white; padding: 20px; }
        
        /* UI BOXES */
        .header-panel { display: flex; justify-content: space-between; align-items: center; background: var(--white); padding: 15px; border-radius: 12px; border: 3px solid var(--speckle-brown); margin-bottom: 20px; }
        .card { background: var(--white); padding: 20px; border-radius: 20px; width: 260px; text-align: center; border: 2px solid var(--speckle-brown); box-shadow: 8px 8px 0px var(--teal-accent); margin: 10px; }
        .shop-container { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

        /* CHAT */
        #chat-container { position: fixed; bottom: 20px; right: 20px; width: 280px; background: white; border: 2px solid var(--speckle-brown); border-radius: 15px; overflow: hidden; z-index: 998; }
        #chat-messages { height: 180px; overflow-y: auto; padding: 10px; font-size: 13px; display: flex; flex-direction: column; }
        .msg { margin: 4px 0; padding: 6px 10px; border-radius: 10px; max-width: 85%; word-wrap: break-word; }
        .msg-user { background: var(--teal-accent); color: white; align-self: flex-end; }
        .msg-owner { background: #eee; color: var(--speckle-brown); align-self: flex-start; }

        /* ADMIN */
        #admin-panel { margin: 30px auto; max-width: 800px; background: #fffcf0; padding: 25px; border-radius: 20px; border: 2px solid #d32f2f; display: none; }
        .admin-section { border-bottom: 1px solid #ddd; padding: 15px 0; }

        button { background: var(--speckle-brown); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        input { padding: 8px; border-radius: 5px; border: 1px solid #ccc; margin: 5px 0; width: 90%; }
    </style>
</head>
<body>

<div id="banned-screen"><h1>⛔ ACCESS DENIED</h1></div>
<div id="lang-popup"><h1>Quail Farm</h1><button onclick="applyLang('en')">🇬🇧 English</button><button onclick="applyLang('tr')">🇹🇷 Türkçe</button><button onclick="applyLang('sa')">🇸🇦 العربية</button></div>

<div id="payment-popup">
    <div style="background: white; color: black; padding: 30px; border-radius: 20px; max-width: 350px;">
        <h2>Payment Details</h2>
        <p>Send <b><span id="pay-amt"></span> TL</b> to:</p>
        <div style="background: #f0f0f0; padding: 10px; border-radius: 10px; word-break: break-all;">
            <b id="display-iban">Loading IBAN...</b>
        </div>
        <p>Your Name/Reference:</p>
        <input type="text" id="pay-ref" placeholder="Full Name"><br><br>
        <button onclick="confirmOrder()">I Have Sent Payment</button>
        <button style="background:gray" onclick="document.getElementById('payment-popup').style.display='none'">Back</button>
    </div>
</div>

<div class="header-panel">
    <div><h1>Quail Farm</h1><small>ID: <span id="my-id-label"></span></small></div>
    <div>Codes: <input type="password" id="admin-gate" oninput="checkAdmin(this.value)" style="width:80px;"></div>
</div>

<div class="shop-container">
    <div class="card">
        <h2 id="egg-name">Quail Egg</h2>
        <div style="font-size:24px;"><span id="egg-p">7</span> TL</div>
        <button onclick="startPay('Egg')">Order</button>
    </div>
    <div class="card">
        <h2 id="quail-name">Live Quail</h2>
        <div style="font-size:24px;"><span id="quail-p">135</span> TL</div>
        <button onclick="startPay('Quail')">Order</button>
    </div>
</div>

<div id="chat-container">
    <div style="background:var(--speckle-brown); color:white; padding:8px; font-size:12px;">Support Chat</div>
    <div id="chat-messages"></div>
    <div style="display:flex; border-top:1px solid #eee;">
        <input type="text" id="chat-in" placeholder="Ask a question..." style="border:none; width:70%;">
        <button onclick="sendChat()" style="width:30%; border-radius:0;">Send</button>
    </div>
</div>

<div id="admin-panel">
    <h2 style="color:red">Owner Control</h2>
    <div class="admin-section">
        <h3>1. Payment Settings</h3>
        IBAN: <input type="text" id="set-iban" placeholder="Enter new IBAN..."><br>
        Egg Price: <input type="number" id="set-egg-p" value="7"><br>
        <button onclick="updateSettings()">Save & Sync IBAN/Prices</button>
    </div>
    <div class="admin-section">
        <h3>2. Active Orders</h3>
        <div id="admin-order-list"></div>
    </div>
    <div class="admin-section">
        <h3>3. Live Conversations</h3>
        <div id="admin-chats"></div>
        <input type="text" id="rep-id" placeholder="User ID">
        <input type="text" id="rep-msg" placeholder="Message">
        <button onclick="adminReply()">Reply</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://realtime-numbers-ddc3e-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myID = localStorage.getItem('qf_id') || (Math.floor(1000+Math.random()*9000)+"-"+Math.floor(1000+Math.random()*9000));
    localStorage.setItem('qf_id', myID);
    document.getElementById('my-id-label').innerText = myID;

    function applyLang(l) { document.getElementById('lang-popup').style.display='none'; }
    function checkAdmin(v) { if(v==="ThePassMustiGithub") document.getElementById('admin-panel').style.display='block'; }

    // SETTINGS SYNC (IBAN & Price)
    function updateSettings() {
        db.ref('settings').set({
            iban: document.getElementById('set-iban').value,
            eggPrice: document.getElementById('set-egg-p').value
        });
        alert("IBAN Updated!");
    }

    db.ref('settings').on('value', (snap) => {
        const s = snap.val();
        if(s) {
            document.getElementById('display-iban').innerText = s.iban;
            document.getElementById('set-iban').value = s.iban;
            document.getElementById('egg-p').innerText = s.eggPrice;
            document.getElementById('set-egg-p').value = s.eggPrice;
        }
    });

    // ORDERING
    function startPay(type) {
        let p = (type==='Egg') ? document.getElementById('egg-p').innerText : 135;
        document.getElementById('pay-amt').innerText = p;
        document.getElementById('payment-popup').style.display='flex';
    }

    function confirmOrder() {
        const ref = document.getElementById('pay-ref').value;
        if(!ref) return alert("Enter your name!");
        db.ref('orders').push({ user: myID, ref: ref, status: "Pending" });
        document.getElementById('payment-popup').style.display='none';
    }

    // CHAT
    function sendChat() {
        const t = document.getElementById('chat-in').value;
        if(t) db.ref('chats/'+myID).push({ s: "u", t: t });
        document.getElementById('chat-in').value = "";
    }

    db.ref('chats/'+myID).on('value', (s) => {
        const m = s.val(); let h = "";
        for(let id in m) h += `<div class="msg msg-${m[id].s==='u'?'user':'owner'}">${m[id].t}</div>`;
        document.getElementById('chat-messages').innerHTML = h;
        document.getElementById('chat-messages').scrollTop = 9999;
    });

    // ADMIN LISTENERS
    db.ref('orders').on('value', (snap) => {
        let h = ""; const o = snap.val();
        for(let id in o) h += `<div>${o[id].user} (${o[id].ref}) <button onclick="db.ref('orders/${id}').remove()">Done</button></div>`;
        document.getElementById('admin-order-list').innerHTML = h;
    });

    db.ref('chats').on('value', (snap) => {
        let h = ""; const c = snap.val();
        for(let uid in c) {
            h += `<div style="background:#ddd;margin-top:5px;"><b>ID: ${uid}</b></div>`;
            for(let mid in c[uid]) h += `<div>${c[uid][mid].s}: ${c[uid][mid].t}</div>`;
        }
        document.getElementById('admin-chats').innerHTML = h;
    });

    function adminReply() {
        const id = document.getElementById('rep-id').value;
        const msg = document.getElementById('rep-msg').value;
        if(id && msg) db.ref('chats/'+id).push({ s: "o", t: msg });
        document.getElementById('rep-msg').value = "";
    }
</script>
</body>
    </html>
